services:
  iabs-api:
    build: .
    container_name: iabs-api
    env_file:
      - .env
    environment:
      IABS_SEED: 42
      IABS_LOG_LEVEL: INFO
      IABS_LOG_FORMAT: json
      IABS_APP_VERSION: 2.16.0
      IABS_KNOWLEDGE_AUTOMATION_ENABLED: "true"
      IABS_KNOWLEDGE_SCHEDULER_POLL_SECONDS: 300
      IABS_KNOWLEDGE_REGISTRY_PATH: /app/data/knowledge_automation.json
      IABS_STATE_PATH: /app/data/brain_state.json
      IABS_AUDIT_LOG_PATH: /app/data/audit.log
      IABS_AUTH_ENABLED: "true"
      IABS_AUTH_USERS_JSON: '{"admin":{"password":"change-me-now","role":"admin"},"operator":{"password":"change-me-operator","role":"operator"},"auditor":{"password":"change-me-auditor","role":"auditor"},"observer":{"password":"change-me-reader","role":"reader"}}'
      IABS_JWT_SECRET: change-this-secret-please-use-32-chars-minimum
      IABS_JWT_EXP_MINUTES: 60
      IABS_JWT_REFRESH_EXP_MINUTES: 10080
      IABS_RATE_LIMIT_ENABLED: "true"
      IABS_RATE_LIMIT_REQUESTS: 120
      IABS_RATE_LIMIT_WINDOW_SECONDS: 60
      IABS_RATE_LIMIT_BACKEND: redis
      IABS_REDIS_URL: redis://redis:6379/0
      IABS_METRICS_ENABLED: "true"
      IABS_MEMORY_PATH: ${IABS_MEMORY_PATH:-/app/data/memory_store.sqlite}
      IABS_MEMORY_DSN: ${IABS_MEMORY_DSN:-}
      DATABASE_URL: ${DATABASE_URL:-}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      SUPABASE_DATABASE_URL: ${SUPABASE_DATABASE_URL:-}
      IABS_POSTGRES_POOL_MIN_SIZE: ${IABS_POSTGRES_POOL_MIN_SIZE:-1}
      IABS_POSTGRES_POOL_MAX_SIZE: ${IABS_POSTGRES_POOL_MAX_SIZE:-5}
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  postgres:
    profiles: ["local-db"]
    image: postgres:16-alpine
    container_name: iabs-postgres
    environment:
      POSTGRES_DB: iabs
      POSTGRES_USER: iabs
      POSTGRES_PASSWORD: iabs_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iabs -d iabs"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: iabs-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: iabs-nginx
    depends_on:
      iabs-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
